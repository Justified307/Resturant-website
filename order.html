<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="order.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>

<!-- NAV -->
<nav>
    <img class="logo" src="images/logo.png" alt="logo">

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="order.html" class="active">Order</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HEADER -->
<section class="order-header">
    <h1>Place Your Order</h1>
    <p>Fill the form below to get your delicious meal delivered fast</p>
</section>

<!-- ORDER FORM -->
<section class="order-section">

    <form class="order-form">

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required>

        <label>Delivery Address</label>
        <input type="text" placeholder="Enter your address" required>

        <label>Select Meal</label>
        <select required>
            <option value="">-- Choose a meal --</option>
            <option>Jollof Rice & Chicken</option>
            <option>Beef Burger & Fries</option>
            <option>Chicken Pizza</option>
            <option>Healthy Salad</option>
            <option>Spaghetti</option>
        </select>

        <label>Quantity</label>
        <input type="number" min="1" value="1">

        <label>Payment Method</label>
        <select>
            <option>Pay on Delivery</option>
            <option>Transfer</option>
        </select>

        <button type="submit">Place Order</button>

    </form>

</section>

<!-- FOOTER -->
<footer>
    <div class="footer-container">

        <div>
            <h3>Contact</h3>
            <p>+2347045145245</p>
            <p>Lagos, Nigeria</p>
        </div>

        <div>
            <h3>Quick Links</h3>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about.html">About</a>
            <a href="order.html">Order</a>
        </div>

        <div>
            <h3>Follow Us</h3>
            <p>Instagram | Facebook | Twitter</p>
        </div>

    </div>
</footer>

</body>
</html>
